{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" type="image/png" href="{% static 'img/base/favicon.ico' %}" />
    <title>Reset password — Infotek Solutions & Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['DM Sans', 'ui-sans-serif', 'system-ui'] } } }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; }
        .field-input {
            display: block; width: 100%; border: 1px solid #e2e8f0; border-radius: 8px;
            padding: 10px 14px; font-size: 0.9375rem; color: #1e293b; background: #ffffff;
            outline: none; transition: border-color 0.15s, box-shadow 0.15s;
            font-family: 'DM Sans', sans-serif;
        }
        .field-input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
    </style>
</head>
<body class="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-sm">

        <!-- Logo / brand -->
        <div class="flex flex-col items-center mb-8">
            <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center mb-4 shadow-sm">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/>
                </svg>
            </div>
            <h1 class="text-xl font-semibold text-slate-800">Infotek Portal</h1>
            <p class="text-sm text-slate-500 mt-0.5">Reset your password</p>
        </div>

        <!-- Form card -->
        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-8">
            <p class="text-sm text-slate-600 mb-5">
                Enter your email address and we'll send you a link to reset your password.
            </p>
            <form method="post" action="" novalidate>
                {% csrf_token %}
                <div class="mb-5">
                    <label for="id_email" class="block text-xs font-medium text-slate-500 uppercase tracking-wider mb-1.5">
                        Email address
                    </label>
                    <input type="email" id="id_email" name="email" autofocus
                           class="field-input" placeholder="you@example.com">
                </div>
                <button type="submit"
                        class="w-full flex items-center justify-center gap-2 px-4 py-2.5 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 active:bg-blue-800 transition-colors shadow-sm">
                    Send reset link
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                    </svg>
                </button>
            </form>
        </div>

        <div class="text-center mt-4">
            <a href="{% url 'login' %}" class="text-xs text-blue-600 hover:text-blue-800 transition-colors">
                Back to sign in
            </a>
        </div>

        <p class="text-center text-xs text-slate-400 mt-4">
            Infotek Solutions &amp; Support &mdash; Internal IT Portal
        </p>
    </div>

</body>
</html>
