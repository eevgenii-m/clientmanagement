var helpMarkdown = `
# Infotek IT Portal — Help Guide

Welcome to the **Infotek Solutions & Support** internal portal. This guide explains every section of the portal and its features.

---

## 🏠 Home

The **Home** page is your portal dashboard. It shows quick-access cards for all major sections. Click any card to navigate directly to that section.

---

## 👥 Clients

The **Clients** section manages all client companies that Infotek supports.

### Features

- **Client list** — searchable table of all clients with phone number and quick actions
- **Client detail** — view full information for a client including:
  - General Info (address, phone, description)
  - People (contacts and employees linked to that client)
- **Add client** — create a new client record via the form
- **Edit client** — update any client's information

### How to use

1. Click **Clients** in the sidebar to open the list
2. Use the search box to filter by name, phone, or other fields
3. Click **View** next to any client to open their detail page
4. Use the **Edit** button on the client page to make changes

---

## 👤 People

The **People** section lists all contacts and employees across all clients.

### Features

- **All people list** — searchable table showing name, company, phone, and email
- **Person detail modal** — click **View** on any row to open a pop-up with full contact info and edit link
- **Add person** — done from within a client's detail page (People section)

### Notes

- A person is always linked to a **Client** (their employer)
- Phone numbers are clickable (tel: links)
- Email addresses are clickable (mailto: links)

---

## 📚 Wiki

The **Wiki** is a knowledge base for internal guides, procedures, and documentation.

### Features

- **Article list** — searchable table of all wiki articles sorted by last updated date
- **Article view** — full rendered article with print / PDF support
- **Rich text editing** — articles are written in **Markdown** with a live-preview editor (EasyMDE)
- **Markdown import** — import \`.md\` or \`.txt\` files directly into the editor
- **Print / PDF** — use the **Print / PDF** button on any article to generate a clean printout (sidebar and navigation are hidden automatically)
- **Keywords** — articles can be tagged with keywords for organisation

### How to write an article

1. Click **+ New Article** on the Wiki list page
2. Write content using Markdown syntax in the editor
3. Use the toolbar for formatting shortcuts (bold, lists, headings, code blocks, etc.)
4. Click **Save** — the article is immediately visible to all portal users

### Markdown tips

\`\`\`
# Heading 1
## Heading 2
**bold**, *italic*, \`inline code\`
- bullet list
1. numbered list
[link text](https://example.com)
\`\`\`

---

## ⚙️ Tools

The **Tools** section stores links and downloadable files that the team uses regularly (software installers, configuration files, reference URLs, etc.).

### Features

- **All tools list** — filterable by type (All / Links / Files) with search
- **Tool detail** — shows type, link/download, description, and visibility setting
- **Two tool types:**
  - **Link** — a URL to an external resource or website
  - **File** — a file upload that team members can download
- **Visibility settings:**
  - **Private** — only visible when logged in
  - **Public / Hidden** — accessible via direct URL but not shown in the public list
  - **Public / In list** — visible to anyone, including unauthenticated users

### How to add a tool

1. Click **Add Link** or **Add File** on the Tools page
2. Fill in the name, URL or upload a file, and set visibility
3. Save — the tool appears in the list immediately

---

## 🔒 Secret Notes

**Secret Notes** are self-destructing messages that can be shared with clients or external contacts via a unique one-time link.

### Features

- **Time-limited** — notes can be set to expire after a certain date/time
- **Read-limited** — notes can be configured to self-destruct after a set number of reads
- **External access** — recipients open the note via a unique link without needing a portal account
- **Two-step open** — the recipient first sees a gate page ("Read note now") before the note is revealed, preventing accidental exposure
- **Admin view** — staff can view notes internally including the sharing link, expiry, and read count

### How to create a secret note

1. Click **New Note** on the Secret Notes page
2. Write the note content (Markdown supported)
3. Optionally set: recipient email, expiry date/time, maximum read count
4. Save — copy the generated share link and send it to the recipient

### Note states

| State | Meaning |
|-------|---------|
| Available | Note is active and can be read |
| Expired | Note passed its expiry date |
| Limit reached | Note reached maximum reads |

---

## 📁 File Sharing

The **File Sharing** section covers two ways to exchange files with clients: outbound shared files and inbound upload links.

### Shared Files

Upload a file and share a public download link with clients or external contacts. No portal account is required to download.

- **Upload any file** — no file type restrictions
- **Download limit** — optionally cap the number of times a file can be downloaded
- **Expiry** — set an expiry date up to 90 days from today; after that the link stops working
- **Download log** — each download is logged with timestamp, IP address, user agent, and referrer
- **Public link** — a unique URL that anyone can use to download the file (no login required)
- **Copy link button** — one-click copy of the download URL

**How to share a file:**

1. Click **Upload File** on the File Sharing page
2. Choose the file and optionally add a description, expiry (1–90 days), or download limit
3. After upload, click **View** to open the file detail page
4. Copy the **Public download link** and share it with the recipient

**File states:** Active · Expired (link returns "File unavailable") · Limit reached

### Upload Links

Upload Links let clients send files to you without a portal account.

- **Create a link** — set a title, optional instructions, expiry (1–90 days), and a maximum file count (1–50)
- **Share the link** — copy the unique URL from the link detail page and send it to the client
- **Client uploads** — the client opens the URL, selects one or more files, and submits — no login required
- **Edit a link** — update the title, instructions, expiry, or file limit at any time
- **Deactivate / Activate** — toggle a link on or off without deleting it
- **Uploaded files** — view and download all files clients have sent via the link detail page

**How to create an upload link:**

1. Click **Upload Links** on the File Sharing page
2. Click **Create Upload Link** and fill in the form
3. Open the link detail page, copy the shareable URL, and send it to the client

---

## 📋 Projects

The **Projects** section is a task and project management board for tracking Infotek's internal work.

### Features

- **Project cards** — each project shows title, status, priority, due date, and open task count
- **Drag-and-drop** — reorder projects by dragging cards (⠿ handle); reorder tasks within a project by dragging rows
- **Task management** — add tasks to any project; tasks support status, priority, due date, and assignment
- **Subtasks** — tasks can have child tasks (subtasks)
- **Quick inline editing** — change task status or priority directly from the row without opening a form
- **Column sort** — click any column header (Status, Priority, Due) in a task table to sort tasks within that project
- **Archive** — archive completed projects to keep the board clean; view, restore, or permanently delete from Archived Projects

### Project statuses

| Status | Meaning |
|--------|---------|
| Active | Currently in progress |
| On hold | Paused temporarily |
| Completed | Finished |
| Cancelled | Will not be completed |

### Task statuses

| Status | Meaning |
|--------|---------|
| Not started | Work hasn't begun |
| In progress | Currently being worked on |
| Done | Completed |
| Blocked | Can't proceed — waiting on something |
| On hold | Paused |

### How to use

1. Click **Projects** in the sidebar
2. Click **+ New Project** to create a project
3. Open a project card and click **+ Add Task** to add tasks
4. Drag the ⠿ handle to reorder projects or tasks
5. Use the inline status/priority selects on each task row for quick updates
6. Click a column header to sort tasks in that project
7. Archive a project with the **Archive** button when it's complete

---

## ✅ To-Do List

The **To-Do List** is a personal and shared task tracker, separate from the Projects module.

### Two panels

- **Personal** — tasks only visible to you; use for personal reminders and daily tasks
- **Shared** — tasks visible and editable by everyone on the team; supports assignee tracking

### Features

- **Flat table view** — all tasks shown in a single sortable table per panel, with columns for task name, status, priority, assignee (shared only), and due date
- **Quick-add** — type a task in the text box below the table and press Add
- **Edit modal** — click the pencil icon on any task to edit title, description, status, priority, due date (and assignee for shared tasks)
- **Status dropdown** — click the status badge on any task to change its status directly from the table
- **Drag-and-drop** — drag tasks within the table to reorder them
- **Priority badges** — High / Medium / Low colour-coded badges on each task
- **Overdue warning** — tasks past their due date show a red ⚠ warning
- **Assign to (Shared only)** — assign a shared task to a team member; their initials appear as an avatar in the Assigned column
- **Auto-archive** — Done tasks are automatically archived 14 days after completion
- **Manual archive** — archive any Done task immediately using the archive button
- **Archived tasks** — view and restore from the **Archived** link in the page header
- **Sort** — click Name, Priority, or Due column headers to sort tasks; click again to reverse

### Task statuses

| Status | Meaning |
|---------|---------|
| Not started | Task not yet begun |
| In progress | Currently being worked on |
| Done | Completed |

### How to use

1. Click **To-Do List** in the sidebar
2. Use the **Personal** / **Shared** tabs to switch panels
3. Add tasks using the quick-add bar below the table
4. Click the status badge to quickly change a task's status
5. Click the pencil icon to edit full details; click the ✕ icon to delete
6. Done tasks auto-archive after 14 days

---

## ❓ Help

This page — you are reading it now. Returns here whenever you need a reminder of how any section works.

---

*Infotek Solutions & Support — Internal IT Portal*
`;

document.addEventListener('DOMContentLoaded', function() {
    var el = document.getElementById('help-content');
    if (el && typeof marked !== 'undefined') {
        marked.setOptions({ breaks: true });
        el.innerHTML = marked.parse(helpMarkdown);
    }
});
</script>
