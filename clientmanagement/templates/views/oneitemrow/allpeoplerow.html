<tr id="{{ person.id }}"
    x-data="{ open: false }"
    @click="if(!$event.target.closest('button,a,form')) open = true"
    class="hover:bg-slate-50 transition-colors cursor-pointer">
    <td class="py-2.5 pr-4 font-medium text-slate-800">{{ person.name }}</td>
    <td class="py-2.5 pr-4 text-slate-500">{{ person.employedby.name|default:"—" }}</td>
    <td class="py-2.5 pr-4 hidden md:table-cell">
        {% if person.phone %}
        {% include "views/components/phonenumber.html" with phone=person.phone %}
        {% endif %}
    </td>
    <td class="py-2.5 pr-4 hidden md:table-cell">
        {% if person.email %}
        <a href="mailto:{{ person.email }}"
           class="inline-flex items-center gap-1.5 text-blue-600 hover:text-blue-800 transition-colors text-sm">
            <svg class="w-3.5 h-3.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
            {{ person.email }}
        </a>
        {% endif %}
    </td>
    <td class="py-2.5">
        {% include "views/modals/personmodal.html" with person=person fullinfo=True %}
    </td>
</tr>
