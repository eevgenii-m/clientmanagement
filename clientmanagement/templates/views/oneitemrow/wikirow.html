<tr id="{{ art.id }}"
    data-url="{{ art.get_link }}"
    onclick="if(!event.target.closest('a,button,form')) window.location=this.dataset.url"
    class="hover:bg-slate-50 transition-colors cursor-pointer">
    <td class="font-medium text-slate-800">{{ art.title }}</td>
    <td class="text-slate-500 text-sm tabular-nums">{{ art.updatedon|date:"Y-m-d" }}</td>
</tr>
